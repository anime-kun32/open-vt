name: Build OpenVT
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux deps
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            gcc \
            g++ \
            python3 \
            python3-pip \
            scons \
            cmake \
            unzip \
            wget \
            xvfb

      # SCons 4.8 has a known build failure with Godot/gd_cubism, pin to 4.7
      - name: Pin SCons to 4.7
        run: pip install scons==4.7 --break-system-packages

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.4.1
          include-templates: true

      - name: Download Cubism Native SDK
        run: |
          wget https://cubism.live2d.com/sdk-native/bin/CubismSdkForNative-5-r.5.zip \
            -O CubismSdkForNative.zip
          unzip CubismSdkForNative.zip

      # The build docs expect the SDK at thirdparty/CubismSdkForNative-5-r.X
      # gd_cubism's SConstruct looks for it there by glob
      - name: Place Cubism SDK into thirdparty
        run: |
          SDK_DIR=$(find . -maxdepth 1 -type d -name 'CubismSdkForNative-*' | head -1)
          echo "Found SDK dir: ${SDK_DIR}"
          mv "${SDK_DIR}" thirdparty/

      # build_dependencies.sh handles building gd_cubism via scons
      # and copying the output .so files into the right addons location
      - name: Build dependencies (gd_cubism + any other submodules)
        run: |
          chmod +x build_dependencies.sh
          ./build_dependencies.sh

      - name: Import project
        run: |
          xvfb-run godot --headless --path . --import || true
          sleep 5

      - name: Export Linux binary
        run: |
          mkdir -p build
          xvfb-run godot \
            --headless \
            --path . \
            --export-release "Linux/X11" \
            build/openvt.x86_64

      - name: Make binary executable
        run: chmod +x build/openvt.x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openvt-linux
          path: build/openvt.x86_64

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: openvt-linux
          path: build

      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ github.event.inputs.tag }}
          git push origin ${{ github.event.inputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: build/openvt.x86_64
