name: Build OpenVT

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux deps
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            cmake \
            unzip \
            wget \
            xvfb

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          include-templates: true

      - name: Download Cubism Native SDK
        run: |
          wget https://cubism.live2d.com/sdk-native/bin/CubismSdkForNative-5-r.5.zip
          unzip CubismSdkForNative-5-r.5.zip

      - name: Place Cubism SDK
        run: |
          mkdir -p thirdparty/CubismNativeFramework
          cp -r CubismSdkForNative-*/* thirdparty/CubismNativeFramework/

      - name: Build dependencies
        run: |
          chmod +x build_dependencies.sh
          ./build_dependencies.sh

      - name: Import project
        run: |
          xvfb-run godot --headless --path . --import

      - name: Export Linux binary
        run: |
          mkdir -p build
          xvfb-run godot \
            --headless \
            --path . \
            --export-release "Linux/X11" \
            build/openvt.x86_64

      - name: Create Tag
        run: |
          git tag ${{ github.event.inputs.tag }}
          git push origin ${{ github.event.inputs.tag }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: build/openvt.x86_64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openvt-linux
          path: build/openvt.x86_64
